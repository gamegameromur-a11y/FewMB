name: Build FewMB

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_NAME: FewMB

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Get CMake
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/Microsoft/vcpkg.git vcpkg
          cd vcpkg
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$PWD" >> $GITHUB_ENV

      - name: Install WebView2 via vcpkg
        shell: pwsh
        run: |
          &"$env:VCPKG_ROOT/vcpkg.exe" install "webview2:x64-windows"
          &"$env:VCPKG_ROOT/vcpkg.exe" integrate install

      - name: Configure
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Set-Location build
          cmake .. `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_CXX_FLAGS="/O2 /W3 /EHsc"

      - name: Build
        shell: pwsh
        run: |
          Set-Location build
          cmake --build . --config Release --parallel

      - name: Copy Runtime DLLs
        shell: pwsh
        run: |
          $outDir = "build/Release"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $vcpkgDll = "$env:VCPKG_ROOT/installed/x64-windows/bin/WebView2Loader.dll"
          if (Test-Path $vcpkgDll) {
            Copy-Item $vcpkgDll $outDir -Force
            Write-Host "Copied WebView2Loader.dll from vcpkg"
          } else {
            Write-Warning "WebView2Loader.dll not found in vcpkg"
          }

      - name: Package
        shell: pwsh
        run: |
          $candidates = @("build/Release", "build/bin/Release", "build/bin", "build")
          $relPath = $null
          foreach ($candidate in $candidates) {
            if (Test-Path $candidate -PathType Container) {
              $relPath = $candidate
              break
            }
          }
          
          if (-not $relPath) {
            Write-Error "Could not locate build output directory"
            exit 1
          }
          
          Write-Host "Packaging from: $relPath"
          if (Test-Path "$relPath/*") {
            Compress-Archive -Path "$relPath/*" -DestinationPath "FewMB-Windows-x64.zip" -Force
            $sizeMB = [math]::Round((Get-Item "FewMB-Windows-x64.zip").Length / 1MB, 2)
            Write-Host "Created FewMB-Windows-x64.zip ($sizeMB MB)"
          } else {
            Write-Error "No files found in $relPath to package"
            exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FewMB-Windows-x64
          path: FewMB-Windows-x64.zip
          if-no-files-found: error

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: FewMB-Windows-x64
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: FewMB-Windows-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
