param(
    [string]$Zip    = "FewMB-Pro.zip",
    [string]$OutDir = "FewMB-Build",
    [string]$Config = "Release"
)

$ErrorActionPreference = "Stop"

# ── 1. Zip'i bul ──────────────────────────────────────────────────────────────
$zipPath = Resolve-Path $Zip -ErrorAction SilentlyContinue
if (-not $zipPath) {
    # Script'in yanında değilse, çalışma dizininde ara
    $zipPath = Join-Path $PSScriptRoot $Zip
    if (-not (Test-Path $zipPath)) {
        Write-Error "Zip bulunamadı: $Zip"
        exit 1
    }
}

Write-Host "`n[1/5] Zip çıkarılıyor: $zipPath" -ForegroundColor Cyan
if (Test-Path $OutDir) { Remove-Item $OutDir -Recurse -Force }
Expand-Archive -Path $zipPath -DestinationPath $OutDir -Force

# İçinde tek bir klasör varsa ona in
$children = Get-ChildItem $OutDir
if ($children.Count -eq 1 -and $children[0].PSIsContainer) {
    $OutDir = $children[0].FullName
}
Write-Host "    Kaynak dizin: $OutDir"

# ── 2. WebView2 SDK (NuGet) ───────────────────────────────────────────────────
Write-Host "`n[2/5] WebView2 SDK indiriliyor (NuGet)..." -ForegroundColor Cyan
$pkgDir = Join-Path $OutDir "packages"

# nuget.exe yoksa indir
$nuget = (Get-Command nuget -ErrorAction SilentlyContinue)?.Source
if (-not $nuget) {
    $nuget = Join-Path $env:TEMP "nuget.exe"
    if (-not (Test-Path $nuget)) {
        Invoke-WebRequest "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" `
            -OutFile $nuget -UseBasicParsing
    }
}

& $nuget install Microsoft.Web.WebView2 -OutputDirectory $pkgDir -NonInteractive | Out-Null

$wv2Root = (Get-ChildItem $pkgDir -Filter "Microsoft.Web.WebView2.*" |
            Sort-Object Name -Descending | Select-Object -First 1).FullName
$wv2Inc  = "$wv2Root\build\native\include"
$wv2Lib  = "$wv2Root\build\native\x64"
Write-Host "    WebView2: $wv2Root"

# ── 3. CMake configure ────────────────────────────────────────────────────────
Write-Host "`n[3/5] CMake configure..." -ForegroundColor Cyan
$buildDir = Join-Path $OutDir "build"
New-Item -ItemType Directory -Force $buildDir | Out-Null

$cmakeArgs = @(
    "-B", $buildDir,
    "-S", $OutDir,
    "-G", "Visual Studio 17 2022",
    "-A", "x64",
    "-DCMAKE_BUILD_TYPE=$Config",
    "-DCMAKE_INCLUDE_PATH=$wv2Inc",
    "-DCMAKE_LIBRARY_PATH=$wv2Lib"
)

cmake @cmakeArgs
if ($LASTEXITCODE -ne 0) { Write-Error "CMake configure başarısız"; exit 1 }

# ── 4. Build ──────────────────────────────────────────────────────────────────
Write-Host "`n[4/5] Derleniyor ($Config)..." -ForegroundColor Cyan
cmake --build $buildDir --config $Config --parallel $env:NUMBER_OF_PROCESSORS
if ($LASTEXITCODE -ne 0) { Write-Error "Build başarısız"; exit 1 }

# ── 5. Sonuç ──────────────────────────────────────────────────────────────────
Write-Host "`n[5/5] Sonuç:" -ForegroundColor Cyan
$exe = Get-Item "$buildDir\bin\$Config\FewMB.exe" -ErrorAction SilentlyContinue
if (-not $exe) {
    # Visual Studio bazen farklı yere koyar
    $exe = Get-ChildItem $buildDir -Filter "FewMB.exe" -Recurse |
           Select-Object -First 1
}

if ($exe) {
    $kb = [math]::Round($exe.Length / 1KB, 1)
    $mb = [math]::Round($exe.Length / 1MB, 3)
    Write-Host "    Çıktı  : $($exe.FullName)"
    Write-Host "    Boyut  : $kb KB ($mb MB)"
    if ($exe.Length -gt 1MB) {
        Write-Warning "1 MB hedefini aştı!"
    } else {
        Write-Host "    ✓ 1 MB altında" -ForegroundColor Green
    }

    # WebView2Loader.dll'yi exe'nin yanına kopyala
    $loader = "$wv2Lib\WebView2Loader.dll"
    if (Test-Path $loader) {
        Copy-Item $loader $exe.DirectoryName -Force
        Write-Host "    WebView2Loader.dll kopyalandı"
    }
} else {
    Write-Warning "FewMB.exe bulunamadı, build çıktısını kontrol et: $buildDir"
}

Write-Host "`nBuild tamamlandı.`n" -ForegroundColor Green
